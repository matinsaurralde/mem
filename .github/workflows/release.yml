name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VERSION=$(python -c "exec(open('src/mem/__init__.py').read()); print(__version__)")
          echo "Tag: $TAG_VERSION | pyproject.toml: $PKG_VERSION | __init__.py: $INIT_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch! Tag=$TAG_VERSION pyproject.toml=$PKG_VERSION __init__.py=$INIT_VERSION"
            echo "Fix: update both pyproject.toml and src/mem/__init__.py, commit, then re-tag."
            exit 1
          fi

      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          python -m build
          twine upload dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"

          # Download tarball and compute SHA256
          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "Tag: $TAG"
          echo "SHA256: $SHA"

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/matinsaurralde/homebrew-tap.git" /tmp/tap
          cd /tmp/tap

          # Update only the release url and sha256 (lines 7-8), not dependency resources.
          # Uses awk to replace only the FIRST url/sha256 pair matching the release pattern.
          awk -v tag_url="$TARBALL_URL" -v sha="$SHA" '
            /url.*github.com\/matinsaurralde\/mem\/archive/ {
              print "  url \"" tag_url "\""
              found_url = 1
              next
            }
            found_url && /sha256/ {
              print "  sha256 \"" sha "\""
              found_url = 0
              next
            }
            { print }
          ' Formula/mem.rb > Formula/mem.rb.tmp
          mv Formula/mem.rb.tmp Formula/mem.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mem.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "mem ${TAG}"
          git push
